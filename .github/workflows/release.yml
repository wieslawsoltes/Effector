name: Release

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the release as prerelease"
        required: false
        type: boolean
        default: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SAMPLE_AOT_RUNTIME_IDENTIFIER: osx-arm64

jobs:
  version:
    name: Determine Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}
      tag-name: ${{ steps.version.outputs.tag-name }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
            TAG_NAME="v${VERSION}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            if [[ "${VERSION}" == *"-"* ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "is-prerelease=${IS_PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "tag-name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

  build-task-tests:
    name: Build and Weaver Tests
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Effector.slnx

      - name: Build
        run: dotnet build Effector.slnx -c Release -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Test build tasks
        run: dotnet test tests/Effector.Build.Tasks.Tests/Effector.Build.Tasks.Tests.csproj -c Release --no-build --logger trx --results-directory artifacts/test/build-tasks

  runtime-tests:
    name: Runtime Tests (macOS)
    runs-on: macos-14
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Effector.slnx

      - name: Build
        run: dotnet build Effector.slnx -c Release -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Test runtime behavior
        run: |
          mkdir -p artifacts/headless-screenshots
          AVALONIA_SCREENSHOT_DIR="${GITHUB_WORKSPACE}/artifacts/headless-screenshots" \
          DYLD_LIBRARY_PATH="${GITHUB_WORKSPACE}/tests/Effector.Runtime.Tests/bin/Release/net8.0/runtimes/osx/native" \
          dotnet test tests/Effector.Runtime.Tests/Effector.Runtime.Tests.csproj -c Release --no-build --logger trx --results-directory artifacts/test/runtime

  nativeaot-sample:
    name: NativeAOT Sample Publish (macOS)
    runs-on: macos-14
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Effector.slnx

      - name: Publish NativeAOT sample app
        run: dotnet publish samples/Effector.Sample.App/Effector.Sample.App.csproj -c Release -r "${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}" -p:PublishAot=true -p:StripSymbols=false -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Archive NativeAOT sample app
        run: ditto -c -k --sequesterRsrc --keepParent "samples/Effector.Sample.App/bin/Release/net8.0/${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}/publish" "artifacts/Effector.Sample.App-${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}-aot.zip"

      - name: Upload NativeAOT sample artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-nativeaot-sample-${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}
          path: artifacts/Effector.Sample.App-${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}-aot.zip
          if-no-files-found: error
          retention-days: 30

  pack:
    name: Pack Release
    runs-on: ubuntu-latest
    needs:
      - version
      - build-task-tests
      - runtime-tests
      - nativeaot-sample
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Effector/Effector.csproj

      - name: Build
        run: dotnet build src/Effector/Effector.csproj -c Release -m:1 --no-restore -p:EffectorPreparePackPayload=true -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Pack
        run: dotnet pack src/Effector/Effector.csproj -c Release --no-build -p:GeneratePackageOnBuild=false -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg -p:Version="${{ needs.version.outputs.version }}" -o artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: release-nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 90

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs:
      - version
      - pack
    environment: nuget
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish packages
        run: |
          shopt -s nullglob
          for package in packages/*.nupkg packages/*.snupkg; do
            dotnet nuget push "$package" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - pack
      - publish-nuget
      - nativeaot-sample
    permissions:
      contents: write
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: packages

      - name: Download NativeAOT sample artifact
        uses: actions/download-artifact@v4
        with:
          name: release-nativeaot-sample-${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}
          path: aot-sample

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Effector v${{ needs.version.outputs.version }}
          tag_name: ${{ needs.version.outputs.tag-name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ needs.version.outputs.is-prerelease == 'true' }}
          generate_release_notes: true
          files: |
            packages/*.nupkg
            packages/*.snupkg
            aot-sample/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
