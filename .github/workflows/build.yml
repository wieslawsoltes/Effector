name: Build

permissions:
  contents: read
  checks: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "release/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SAMPLE_AOT_RUNTIME_IDENTIFIER: osx-arm64

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-prefix: ${{ steps.version.outputs.version-prefix }}
      version-suffix: ${{ steps.version.outputs.version-suffix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION_PREFIX=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)

          if [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            VERSION_SUFFIX=""
          else
            VERSION_SUFFIX="-ci.${GITHUB_RUN_NUMBER}"
          fi

          echo "version-prefix=${VERSION_PREFIX}" >> "${GITHUB_OUTPUT}"
          echo "version-suffix=${VERSION_SUFFIX}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION_PREFIX}${VERSION_SUFFIX}" >> "${GITHUB_OUTPUT}"

  build-task-tests:
    name: Build and Weaver Tests
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Effector.slnx

      - name: Build
        run: dotnet build Effector.slnx -c Release -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Test build tasks
        run: dotnet test tests/Effector.Build.Tasks.Tests/Effector.Build.Tasks.Tests.csproj -c Release --no-build --logger trx --results-directory artifacts/test/build-tasks

      - name: Upload build task test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-task-test-results
          path: artifacts/test/build-tasks/**/*.trx
          if-no-files-found: error
          retention-days: 7

      - name: Publish build task test results
        uses: dorny/test-reporter@v1
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Build Task Tests
          path: artifacts/test/build-tasks/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

  runtime-tests:
    name: Runtime Tests (macOS)
    runs-on: macos-14
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Effector.slnx

      - name: Build
        run: dotnet build Effector.slnx -c Release -m:1 --no-restore -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Test runtime behavior
        run: |
          mkdir -p artifacts/headless-screenshots
          AVALONIA_SCREENSHOT_DIR="${GITHUB_WORKSPACE}/artifacts/headless-screenshots" \
          DYLD_LIBRARY_PATH="${GITHUB_WORKSPACE}/tests/Effector.Runtime.Tests/bin/Release/net8.0/runtimes/osx/native" \
          dotnet test tests/Effector.Runtime.Tests/Effector.Runtime.Tests.csproj -c Release --no-build --logger trx --results-directory artifacts/test/runtime

      - name: Upload runtime test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-test-results
          path: artifacts/test/runtime/**/*.trx
          if-no-files-found: error
          retention-days: 7

      - name: Publish runtime test results
        uses: dorny/test-reporter@v1
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Runtime Tests
          path: artifacts/test/runtime/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

      - name: Upload headless screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-headless-screenshots
          path: artifacts/headless-screenshots/**
          if-no-files-found: ignore
          retention-days: 7

  nativeaot-sample:
    name: NativeAOT Sample Publish (macOS)
    runs-on: macos-14
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Effector.slnx

      - name: Publish NativeAOT sample app
        run: dotnet publish samples/Effector.Sample.App/Effector.Sample.App.csproj -c Release -r "${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}" -p:PublishAot=true -p:StripSymbols=false -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Archive NativeAOT sample app
        run: ditto -c -k --sequesterRsrc --keepParent "samples/Effector.Sample.App/bin/Release/net8.0/${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}/publish" "artifacts/Effector.Sample.App-${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}-aot.zip"

      - name: Upload NativeAOT sample artifact
        uses: actions/upload-artifact@v4
        with:
          name: nativeaot-sample-${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}
          path: artifacts/Effector.Sample.App-${{ env.SAMPLE_AOT_RUNTIME_IDENTIFIER }}-aot.zip
          if-no-files-found: error
          retention-days: 14

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs:
      - version
      - build-task-tests
      - runtime-tests
      - nativeaot-sample
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Effector/Effector.csproj

      - name: Build package project
        run: dotnet build src/Effector/Effector.csproj -c Release -m:1 --no-restore -p:EffectorPreparePackPayload=true -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}"

      - name: Pack
        run: dotnet pack src/Effector/Effector.csproj -c Release --no-build -p:GeneratePackageOnBuild=false -p:Version="${{ needs.version.outputs.version }}" -o artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
          retention-days: 30
